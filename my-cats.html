<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Cats | MeowNest</title>

<link
href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
rel="stylesheet"
>
<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

:root{
--primary:#2563eb;
--primary-dark:#1d4ed8;
--bg:#f8fafc;
--text:#111827;
--gray:#64748b;
--border:#e5e7eb;
--shadow:0 10px 25px rgba(0,0,0,.06);
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
padding-bottom:90px;
}

.top-bar{
position:sticky;
top:0;
z-index:1000;

background:white;

padding:18px 5%;

border-bottom:1px solid var(--border);

display:flex;
align-items:center;
gap:20px;
}

.back-btn{
text-decoration:none;
color:var(--text);

display:flex;
align-items:center;
gap:8px;

font-weight:600;
}

.back-btn i{
font-size:22px;
}

.container{
max-width:1200px;
margin:auto;
padding:25px 5%;
}

.page-header{
margin-bottom:25px;
}

.page-header h2{
margin-bottom:8px;
}

.page-header p{
color:var(--gray);
}

.cats-grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(300px,1fr));

gap:20px;
}

.cat-card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:var(--shadow);
}

.cat-image{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.cat-content{
padding:18px;
}

.cat-content h3{
margin-bottom:8px;
}

.cat-content p{
color:var(--gray);
margin-bottom:6px;
}

.status-badge{
display:inline-block;

padding:6px 12px;

border-radius:999px;

font-size:12px;
font-weight:700;

margin-top:10px;
margin-bottom:15px;
}

.available{
background:#dcfce7;
color:#166534;
}

.adopted{
background:#fee2e2;
color:#dc2626;
}

.card-actions{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:15px;
}

.card-actions button{
border:none;
padding:12px;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.view-btn{
background:#dbeafe;
color:#2563eb;
}

.edit-btn{
background:#ede9fe;
color:#7c3aed;
}

.adopt-btn{
background:#dcfce7;
color:#15803d;
}

.delete-btn{
background:#fee2e2;
color:#dc2626;
}

.empty-state{
text-align:center;
padding:80px 20px;
}

.empty-state i{
font-size:80px;
color:#cbd5e1;
}

.empty-state h3{
margin:20px 0 10px;
}

.empty-state p{
color:var(--gray);
margin-bottom:20px;
}

.add-btn{
display:inline-block;

background:#2563eb;
color:white;

text-decoration:none;

padding:14px 20px;

border-radius:14px;
}

.mobile-nav{
position:fixed;
bottom:0;
left:0;
right:0;

height:70px;

background:white;

border-top:1px solid var(--border);

display:flex;
justify-content:space-around;
align-items:center;
}

.mobile-nav a{
font-size:24px;
color:#64748b;
text-decoration:none;
}

.mobile-nav .active{
color:#2563eb;
}

@media(max-width:768px){

.cats-grid{
grid-template-columns:1fr;
}

}
</style>

</head>

<body>

<header class="top-bar">

<a
href="profile.html"
class="back-btn"
>

<i class="ri-arrow-left-line"></i>

Back

</a>

<h1>

My Cats

</h1>

</header>

<main class="container">

<div class="page-header">

<h2>

My Posted Cats

</h2>

<p>

Manage all cats you have posted.

</p>

</div>

<div
id="catsContainer"
class="cats-grid"
>

</div>

<div
id="emptyState"
class="empty-state"
style="display:none;"
>

<i class="ri-emotion-sad-line"></i>

<h3>

No Cats Posted Yet

</h3>

<p>

You haven't added any cats yet.

</p>

<a
href="add-cat.html"
class="add-btn"
>

Add First Cat

</a>

</div>

</main>

<nav class="mobile-nav">

<a href="dashboard.html">

<i class="ri-home-5-line"></i>

</a>

<a href="add-cat.html">

<i class="ri-add-circle-line"></i>

</a>

<a href="favorites.html">

<i class="ri-heart-3-line"></i>

</a>

<a
href="profile.html"
class="active"
>

<i class="ri-user-3-line"></i>

</a>

</nav>
<script >
    const API =
"https://meownest-backend.onrender.com";

const token =
localStorage.getItem("token");

if(!token){

window.location.href =
"index.html";

}

const catsContainer =
document.getElementById(
"catsContainer"
);

const emptyState =
document.getElementById(
"emptyState"
);


function renderImages(){

imagePreview.innerHTML = "";

imageUrls.forEach((url,index)=>{

imagePreview.innerHTML += `

<div class="image-box">

<img
src="${url}"
alt="Cat Image"
>

<button
type="button"
class="remove-image"
onclick="removeImage(${index})"
>

✕

</button>

</div>

`;

});

}

function removeImage(index){

imageUrls.splice(index,1);

renderImages();

}
/* =========================
LOAD MY CATS
========================= */

async function loadMyCats(){

try{

const response =
await fetch(

`${API}/api/my-cats`,

{
headers:{
Authorization:
`Bearer ${token}`
}
}

);

const data =
await response.json();

if(
!data.success ||
data.count === 0
){

catsContainer.style.display =
"none";

emptyState.style.display =
"block";

return;

}

catsContainer.innerHTML = "";

data.cats.forEach(cat=>{

catsContainer.innerHTML += `

<div class="cat-card">

<img
class="cat-image"
src="${
cat.images?.[0] ||
'https://placehold.co/500x300?text=MeowNest'
}"
>

<div class="cat-content">

<h3>
${cat.name}
</h3>

<p>
🐾 ${cat.breed || "Unknown"}
</p>

<p>
📍 ${cat.city || "Unknown"}
</p>

<span
class="status-badge ${cat.status}"
>

${cat.status}

</span>

<div class="card-actions">

<button
class="view-btn"
onclick="
viewCat(
'${cat._id}'
)
"
>

View

</button>

<button
class="edit-btn"
onclick="
editCat(
'${cat._id}'
)
"
>

Edit

</button>

<button
class="adopt-btn"
onclick="
markAdopted(
'${cat._id}'
)
"
>

Adopted

</button>

<button
class="delete-btn"
onclick="
deleteCat(
'${cat._id}'
)
"
>

Delete

</button>

</div>

</div>

</div>

`;

});

}catch(error){

console.log(error);

showAlert(
"Failed to load cats"
);

}

}

/* =========================
VIEW
========================= */

function viewCat(id){

window.location.href =
`cat.html?id=${id}`;

}

/* =========================
EDIT
========================= */

function editCat(id){

window.location.href =
`edit-cat.html?id=${id}`;

}

/* =========================
MARK ADOPTED
========================= */

async function markAdopted(id){

if(
!confirm(
"Mark this cat as adopted?"
)
){
return;
}

try{

const response =
await fetch(

`${API}/api/cats/${id}/adopted`,

{
method:"PUT",

headers:{
Authorization:
`Bearer ${token}`
}
}

);

const data =
await response.json();

showAlert(
data.message
);

loadMyCats();

}catch(error){

console.log(error);

}

}

/* =========================
DELETE CAT
========================= */

async function deleteCat(id){

if(
!confirm(
"Delete this cat?"
)
){
return;
}

try{

const response =
await fetch(

`${API}/api/cats/${id}`,

{
method:"DELETE",

headers:{
Authorization:
`Bearer ${token}`
}
}

);

const data =
await response.json();

showAlert(
data.message
);

loadMyCats();

}catch(error){

console.log(error);

}

}

/* =========================
START
========================= */

loadMyCats();
</script>

<script src="ban.js"></script>
<div class="loader-overlay">
<div class="loader"></div>
</div>

<script src="ui.js"></script>
</body>

</html>
