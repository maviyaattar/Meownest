<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Cat | MeowNest</title>

    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
        rel="stylesheet"
    >
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

:root{
    --primary:#2563eb;
    --primary-dark:#1d4ed8;
    --bg:#f8fafc;
    --card:#ffffff;
    --text:#111827;
    --gray:#64748b;
    --border:#e5e7eb;
    --shadow:0 10px 25px rgba(0,0,0,.06);
    --radius:18px;
}

body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
}

/* ======================
   TOP BAR
====================== */

.top-bar{
    position:sticky;
    top:0;
    z-index:1000;

    background:white;

    border-bottom:1px solid var(--border);

    display:flex;
    align-items:center;
    gap:20px;

    padding:18px 5%;
}

.back-btn{
    text-decoration:none;
    color:var(--text);

    display:flex;
    align-items:center;
    gap:8px;

    font-weight:600;
}

.back-btn i{
    font-size:20px;
}

.top-bar h1{
    font-size:1.4rem;
}

/* ======================
   CONTAINER
====================== */

.container{
    max-width:800px;
    margin:auto;
    padding:30px 5% 100px;
}

/* ======================
   FORM
====================== */

#addCatForm{
    background:white;
    border-radius:24px;
    padding:30px;
    box-shadow:var(--shadow);
}

/* ======================
   FORM GROUP
====================== */

.form-group{
    margin-bottom:22px;
}

.form-group label{
    display:block;
    margin-bottom:10px;
    font-weight:600;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;

    padding:15px;

    border:1px solid var(--border);

    border-radius:14px;

    outline:none;

    font-size:15px;

    background:white;

    transition:.3s;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(37,99,235,.1);
}

.form-group textarea{
    resize:none;
    min-height:120px;
}

.form-group small{
    display:block;
    margin-top:8px;
    color:var(--gray);
}

/* ======================
   FILE INPUT
====================== */
.upload-box{

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    text-align:center;

    gap:10px;

    padding:40px 20px;

    border:2px dashed #93c5fd;

    border-radius:20px;

    background:#eff6ff;

    cursor:pointer;

    transition:.3s;

}

.upload-box:hover{

    border-color:#2563eb;

    background:#dbeafe;

}

.upload-box i{

    font-size:48px;

    color:#2563eb;

}

.upload-box h3{

    font-size:18px;

}

.upload-box p{

    color:#64748b;

}

.upload-box span{

    font-size:13px;

    color:#94a3b8;

}
/* ======================
   IMAGE PREVIEW
====================== */

.image-preview{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(120px,1fr));

    gap:15px;

    margin-bottom:25px;
}

.image-preview img{
    width:100%;
    height:120px;

    object-fit:cover;

    border-radius:14px;

    border:1px solid var(--border);
}

/* ======================
   CHECKBOXES
====================== */

.checkbox-group{
    display:flex;
    flex-direction:column;
    gap:14px;

    margin-bottom:25px;
}

.checkbox-group label{
    display:flex;
    align-items:center;
    gap:12px;

    font-weight:500;
}

.checkbox-group input{
    width:18px;
    height:18px;
}

/* ======================
   SUBMIT BUTTON
====================== */

#submitBtn{
    width:100%;

    border:none;

    background:var(--primary);

    color:white;

    padding:16px;

    border-radius:14px;

    cursor:pointer;

    font-size:16px;
    font-weight:700;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    transition:.3s;
}

#submitBtn:hover{
    background:var(--primary-dark);
}

#submitBtn i{
    font-size:20px;
}

/* ======================
   STATUS
====================== */

#uploadStatus{
    margin-top:18px;
    text-align:center;
    font-weight:600;
    color:var(--gray);
}

/* ======================
   RESPONSIVE
====================== */

@media(max-width:768px){

    .top-bar{
        padding:15px 5%;
    }

    .top-bar h1{
        font-size:1.2rem;
    }

    #addCatForm{
        padding:22px;
    }

    .image-preview{
        grid-template-columns:
        repeat(2,1fr);
    }

}
    </style>

</head>

<body>

    <!-- TOP BAR -->

    <header class="top-bar">

        <a href="dashboard.html" class="back-btn">

            <i class="ri-arrow-left-line"></i>

            Back

        </a>

        <h1>
            Add Cat
        </h1>

    </header>

    <!-- MAIN -->

    <main class="container">

        <form id="addCatForm">

            <!-- IMAGE UPLOAD -->
<div class="form-group">

    <label>
        Cat Photos
    </label>

    <label
        for="catImages"
        class="upload-box"
    >

        <i class="ri-image-add-line"></i>

        <h3>
            Upload Cat Photos
        </h3>

        <p>
            Click to select images
        </p>

        <span>
            <p id="fileCount"></p>
            JPG, PNG, WEBP
        </span>

    </label>

    <input
        type="file"
        id="catImages"
        accept="image/*"
        multiple
        hidden
    >

</div>

            <!-- IMAGE PREVIEW -->

            <div
                id="imagePreview"
                class="image-preview"
            >

            </div>

            <!-- NAME -->

            <div class="form-group">

                <label>
                    Cat Name
                </label>

                <input
                    type="text"
                    id="catName"
                    placeholder="Enter cat name"
                    required
                >

            </div>

            <!-- BREED -->

            <div class="form-group">

                <label>
                    Breed
                </label>

                <input
                    type="text"
                    id="catBreed"
                    placeholder="Persian, Indie, Siamese..."
                >

            </div>

            <!-- AGE -->

            <div class="form-group">

                <label>
                    Age
                </label>

           <input
type="number"
id="catAge"
placeholder="Age in years"
min="0"
step="0.1"
>

            </div>

            <!-- GENDER -->

            <div class="form-group">

                <label>
                    Gender
                </label>

                <select id="catGender">

                    <option value="">
                        Select Gender
                    </option>

                    <option value="Male">
                        Male
                    </option>

                    <option value="Female">
                        Female
                    </option>

                </select>

            </div>

            <!-- COLOR -->

            <div class="form-group">

                <label>
                    Color
                </label>

                <input
                    type="text"
                    id="catColor"
                    placeholder="White, Black, Brown..."
                >

            </div>

            <!-- CITY -->

            <div class="form-group">

                <label>
                    City
                </label>

                <input
                    type="text"
                    id="catCity"
                    placeholder="Enter city"
                >

            </div>

            <!-- DESCRIPTION -->

            <div class="form-group">

                <label>
                    Description
                </label>

                <textarea
                    id="catDescription"
                    placeholder="Tell people about this cat..."
                ></textarea>

            </div>

            <!-- STORY -->

            <div class="form-group">

                <label>
                    Rescue Story
                </label>

                <textarea
                    id="catStory"
                    placeholder="How was this cat rescued?"
                ></textarea>

            </div>

            <!-- CHECKBOXES -->

            <div class="checkbox-group">

                <label>

                    <input
                        type="checkbox"
                        id="vaccinated"
                    >

                    Vaccinated

                </label>

                <label>

                    <input
                        type="checkbox"
                        id="friendlyKids"
                    >

                    Friendly With Kids

                </label>

                <label>

                    <input
                        type="checkbox"
                        id="friendlyPets"
                    >

                    Friendly With Pets

                </label>

            </div>

            <!-- INDOOR / OUTDOOR -->

            <div class="form-group">

                <label>
                    Indoor / Outdoor
                </label>

                <select id="indoorOutdoor">

                    <option value="">
                        Select
                    </option>

                    <option value="Indoor">
                        Indoor
                    </option>

                    <option value="Outdoor">
                        Outdoor
                    </option>

                </select>

            </div>

            <!-- STATUS -->

            <div class="form-group">

                <label>
                    Adoption Status
                </label>

                <select id="catStatus">

                    <option value="available">
                        Available
                    </option>

                    <option value="adopted">
                        Adopted
                    </option>

                </select>

            </div>

            <!-- SUBMIT -->

            <button
                type="submit"
                id="submitBtn"
            >

                <i class="ri-upload-cloud-2-line"></i>

                <span id="btnText">
                    Add Cat
                </span>

            </button>

            <!-- STATUS MESSAGE -->

            <div id="uploadStatus">

            </div>

        </form>

    </main>
<script>

const API =
"https://meownest-backend.onrender.com";

const token =
localStorage.getItem("token");

/* =========================
AUTH CHECK
========================= */

if(!token){

window.location.href =
"index.html";

}

/* =========================
ELEMENTS
========================= */

const form =
document.getElementById("addCatForm");

const imageInput =
document.getElementById("catImages");

const imagePreview =
document.getElementById("imagePreview");

const uploadStatus =
document.getElementById("uploadStatus");

const submitBtn =
document.getElementById("submitBtn");

const btnText =
document.getElementById("btnText");

const fileCount =
document.getElementById("fileCount");
/* =========================
IMAGE PREVIEW
========================= */

imageInput.addEventListener(
"change",
()=>{


imagePreview.innerHTML = "";

const files =
imageInput.files;
fileCount.textContent =
files.length + " image(s) selected";

for(let file of files){

const reader =
new FileReader();

reader.onload = (e)=>{

imagePreview.innerHTML += `

<img
src="${e.target.result}"
alt="Preview"
>

`;

};

reader.readAsDataURL(file);

}

}
);

/* =========================
UPLOAD SINGLE IMAGE
========================= */

async function uploadImage(file){

const formData =
new FormData();

formData.append(
"image",
file
);

const response =
await fetch(

`${API}/api/upload`,

{
method:"POST",

headers:{
Authorization:
`Bearer ${token}`
},

body:formData
}

);

const data =
await response.json();

if(!data.success){

throw new Error(
data.message
);

}

return data.imageUrl;

}

/* =========================
SUBMIT FORM
========================= */

form.addEventListener(
"submit",
async (e)=>{

e.preventDefault();

showLoader();
try{

submitBtn.disabled = true;

btnText.textContent =
"Uploading...";

uploadStatus.textContent =
"Uploading images...";

if(imageInput.files.length === 0){

showAlert(
"Please select at least one image"
);

return;

}
const imageUrls = [];

const files =
imageInput.files;

/* Upload Images */

for(let file of files){

const url =
await uploadImage(file);

imageUrls.push(url);

}

/* Create Cat */

uploadStatus.textContent =
"Creating cat...";

const response =
await fetch(

`${API}/api/cats`,

{
method:"POST",

headers:{
"Content-Type":
"application/json",

Authorization:
`Bearer ${token}`
},

body:JSON.stringify({

name:
document.getElementById(
"catName"
).value,

breed:
document.getElementById(
"catBreed"
).value,

age:Number(
document.getElementById(
"catAge"
).value
),

gender:
document.getElementById(
"catGender"
).value,

color:
document.getElementById(
"catColor"
).value,

description:
document.getElementById(
"catDescription"
).value,

story:
document.getElementById(
"catStory"
).value,

vaccinated:
document.getElementById(
"vaccinated"
).checked,

friendlyWithKids:
document.getElementById(
"friendlyKids"
).checked,

friendlyWithPets:
document.getElementById(
"friendlyPets"
).checked,

indoorOutdoor:
document.getElementById(
"indoorOutdoor"
).value,

city:
document.getElementById(
"catCity"
).value,

status:
document.getElementById(
"catStatus"
).value,

images:
imageUrls

})

}

);

const data =
await response.json();

if(!data.success){

throw new Error(
data.message
);

}

uploadStatus.textContent =
"Cat added successfully 🐱";

setTimeout(()=>{

window.location.href =
"dashboard.html";

},1500);

}catch(error){

console.log(error);

uploadStatus.textContent =
error.message;

showAlert(
error.message
);

}finally{

submitBtn.disabled = false;

btnText.textContent =
"Add Cat";

}
hideLoader();
}
);



</script>
<script src="ban.js"></script>
<div class="loader-overlay">
<div class="loader"></div>
</div>

<script src="ui.js"></script>

</body>

</html>
